site_name: Manual de Operaciones — Casino Sabor Mirandiano
site_description: Guía de operaciones para el personal de casino y administradores
site_author: Sabor Mirandiano
site_url: https://sabormirandiano.cl/docs/

repo_url: https://sabormirandiano.cl
repo_name: Portal de Apoderados

docs_dir: docs
site_dir: ../app/docs_site

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/solid/house

extra:
  homepage: https://sabormirandiano.cl
  social:
    - icon: fontawesome/solid/house
      link: https://sabormirandiano.cl
      name: Volver al Portal

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Cómo Hacer:
      - Registrarse como Apoderado: como-hacer/registro-apoderado.md
      - Abonar Saldo: como-hacer/abonar-saldo.md
      - Pedir Almuerzos del Casino: como-hacer/pedir-almuerzo.md
      - Consultar Datos Históricos: como-hacer/historial.md
  - Cosas Administrativas:
      - Gestor de Menús: admin/gestor-menus.md
      - Asignar Tag a un Alumno: admin/tag-alumno.md
      - Aprobar Abonos en Cafetería: admin/aprobar-abonos.md
  - Preguntas Frecuentes: faq/index.md
  - Glosario: glosario.md
