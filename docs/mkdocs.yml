site_name: Manual de Operaciones — Casino Sabor Mirandiano
site_description: Guía de operaciones para el personal de casino y administradores
site_author: Sabor Mirandiano
site_url: https://localhost/docs/

docs_dir: docs
site_dir: ../app/docs_site

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Cómo Hacer:
      - Registrarse como Apoderado: como-hacer/registro-apoderado.md
      - Abonar Saldo: como-hacer/abonar-saldo.md
      - Pedir Almuerzos del Casino: como-hacer/pedir-almuerzo.md
      - Consultar Historial de Pedidos: como-hacer/historial-pedidos.md
      - Consultar Historial de Abonos: como-hacer/historial-abonos.md
      - Ver la Ficha de un Alumno: como-hacer/ficha-alumno.md
      - Ajustar Configuración de la Cuenta: como-hacer/ajustar-configuracion.md
  - Preguntas Frecuentes: faq/index.md
  - Glosario: glosario.md
