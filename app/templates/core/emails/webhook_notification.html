<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" style="color-scheme: light dark; supported-color-schemes: light dark;">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Webhook Notification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark only" />
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: Arial, Helvetica, sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f4f7;">
  <tr>
    <td align="center" style="padding: 24px 0;">
      <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0"
             style="background-color: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0;">
        <!-- Header -->
        <tr>
          <td style="background-color: #1a1a2e; padding: 20px 32px;">
            <h1 style="margin: 0; color: #ffffff; font-size: 20px; font-weight: 600;">
              &#128268; Webhook Received
            </h1>
          </td>
        </tr>
        <!-- Provider & Transaction -->
        <tr>
          <td style="padding: 24px 32px 0 32px;">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
              <tr>
                <td style="padding: 8px 12px; background-color: #f0f4ff; border-radius: 6px; border-left: 4px solid #4a6cf7;">
                  <p style="margin: 0 0 4px 0; font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px;">
                    Provider
                  </p>
                  <p style="margin: 0; font-size: 16px; font-weight: 600; color: #1a1a2e;">
                    {{ provider }}
                  </p>
                </td>
              </tr>
              <tr><td style="height: 12px;"></td></tr>
              <tr>
                <td style="padding: 8px 12px; background-color: #f0f4ff; border-radius: 6px; border-left: 4px solid #4a6cf7;">
                  <p style="margin: 0 0 4px 0; font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px;">
                    Transaction
                  </p>
                  <p style="margin: 0; font-size: 16px; font-weight: 600; color: #1a1a2e; word-break: break-all;">
                    {{ transaction or 'N/A' }}
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Headers -->
        <tr>
          <td style="padding: 24px 32px 0 32px;">
            <p style="margin: 0 0 8px 0; font-size: 14px; font-weight: 600; color: #374151;">
              Headers
            </p>
            <div style="background-color: #1e1e2e; border-radius: 6px; padding: 16px; overflow-x: auto;">
              <pre style="margin: 0; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #a6e3a1; white-space: pre-wrap; word-break: break-all;">{{ headers_json }}</pre>
            </div>
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding: 24px 32px;">
            <p style="margin: 0 0 8px 0; font-size: 14px; font-weight: 600; color: #374151;">
              Body
            </p>
            <div style="background-color: #1e1e2e; border-radius: 6px; padding: 16px; overflow-x: auto;">
              <pre style="margin: 0; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #a6e3a1; white-space: pre-wrap; word-break: break-all;">{{ body_json }}</pre>
            </div>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="padding: 16px 32px; background-color: #f9fafb; border-top: 1px solid #e5e7eb;">
            <p style="margin: 0; font-size: 12px; color: #9ca3af; text-align: center;">
              This is an automated webhook notification from flask-merchants.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
