{% extends "base.html" %}

{% block page_header -%}
<div class="page-header d-print-none text-white">
  <div class="container-xl">
    <div class="row g-2 align-items-center">
      <div class="col">
        <h1 class="page-title">Registro como personal</h1>
      </div>
    </div>
  </div>
</div>
{% endblock page_header -%}

{% block page_body %}
<div class="container-xl">
  <div class="row g-3 justify-content-center">
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header"><h3 class="card-title">Completa tu perfil</h3></div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('staff.setup') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label">Nombre completo</label>
              <input type="text" class="form-control" name="nombre" required placeholder="Ej: Ana Pérez">
            </div>
            <button type="submit" class="btn btn-primary w-100">Registrarme</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock page_body %}
